services:
  postgres:
    image: postgres:17
    container_name: postgres-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: fraternityos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fraternityos"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./server
    container_name: fraternityos-backend
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      # Env vars override application.yml (Spring relaxed binding), pointing the
      # app at the compose Postgres instead of localhost.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fraternityos
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # Sourced from the environment (e.g. a .env file — see .env.example).
      # Falls back to the dev secret so the stack still boots locally; the app
      # logs a warning when that fallback is in use. Set a strong value in prod.
      JWT_SECRET: ${JWT_SECRET:-change-me-dev-secret-at-least-32-bytes-long-000}
      FILE_STORAGE_DIR: /app/uploads

    ports:
      - "8080:8080"

    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: fraternityos-frontend
    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "5173:80"

volumes:
  postgres_data:
  backend_uploads:
