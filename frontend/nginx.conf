server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend, stripping the /api prefix — mirrors the
    # Vite dev proxy so the SPA's "/api" baseURL works the same in production.
    # "backend" is the docker-compose service name.
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
